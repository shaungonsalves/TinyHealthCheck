version: '3.8'

services:
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - tiny-network
      
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tiny-network

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - tiny-network

  worker:
    build: ./worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - tiny-network

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tiny-network

networks:
  tiny-network:
    driver: bridge